name: Update stats

on:
  schedule:
    # Every 12 hours (UTC). GitHub may delay scheduled runs by a few minutes.
    - cron: '17 5,17 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch stats
        run: node scripts/fetch-stats.js
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          LETTERBOXD_USERNAME: ${{ secrets.LETTERBOXD_USERNAME }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}

      - name: Commit stats.json if changed
        run: |
          git add data/stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update stats.json"
          git push
