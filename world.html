<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World — Pranshu Acharya</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: ui-monospace, "Courier New", Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            min-height: 100vh;
            padding: 40px 60px;
        }

        /* ── LOADING ── */
        .top-loader {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: #fff;
            z-index: 3000;
            width: 0;
            transition: width 0.4s cubic-bezier(0.1, 0.5, 0.5, 1), opacity 0.5s ease;
            opacity: 1;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* ── SKELETON ── */
        .skeleton {
            background: #0a0a0a;
            position: relative;
            overflow: hidden;
        }

        .skeleton::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .artist-img-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #111;
            object-fit: cover;
            filter: grayscale(1);
            border: 1px solid #222;
        }

        .artists-shelf {
            grid-column: 1 / -1;
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #111;
            overflow: hidden;
            scrollbar-width: none;
            flex-wrap: wrap;
        }

        .artists-shelf::-webkit-scrollbar {
            display: none;
        }

        .artist-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0a0a0a;
            padding: 4px 12px 4px 4px;
            border-radius: 20px;
            border: 1px solid #222;
            color: #aaa;
            font-size: 10px;
            text-decoration: none;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .artist-pill:hover {
            border-color: #333;
            color: #fff;
            background: #111;
        }

        .section-subtitle {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #777;
            margin-bottom: 20px;
            border-bottom: 1px solid #111;
            padding-bottom: 8px;
        }

        .artwork-grid img.top-item {
            border: 1px solid rgba(255, 255, 255, 0.1);
            filter: contrast(1.2) grayscale(0.5);
        }

        .artwork-grid img.top-item:hover {
            filter: contrast(1.4) grayscale(0);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }


        /* ── NAV ── */
        .page-nav {
            margin-bottom: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #666;
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            padding: 10px 0;
            z-index: 1000;
        }

        .page-nav a {
            color: #fff;
            text-decoration: none;
            padding: 2px 6px;
            transition: background 0.2s, color 0.2s;
        }

        .page-nav a:hover {
            background: #fff;
            color: #000;
        }

        .nav-sections {
            display: flex;
            gap: 16px;
        }

        .nav-sections a {
            color: #777;
            padding: 2px 0;
        }

        .nav-sections a:hover {
            background: none;
            color: #fff;
        }

        .metadata-item {
            font-size: 11px;
            color: #999;
            text-decoration: none;
            display: block;
            transition: color 0.2s, opacity 0.3s, transform 0.2s;
            word-break: break-word;
            white-space: normal;
            max-width: 100%;
        }

        .metadata-item.highlighted {
            color: #fff;
            opacity: 1 !important;
        }

        /* ── FOCUS EFFECTS ── */
        .world-section.is-focusing .artwork-grid img,
        .world-section.is-focusing .metadata-item {
            opacity: 0.35;
        }

        .world-section.is-focusing .artwork-grid img.highlighted,
        .world-section.is-focusing .metadata-item.highlighted {
            opacity: 1;
            filter: grayscale(0) contrast(1.2);
        }

        .artwork-grid img {
            transition: opacity 0.3s, filter 0.3s, transform 0.3s;
        }

        /* ── LAYOUT ── */
        .world-section {
            max-width: 1000px;
            margin: 0 auto 120px auto;
            scroll-margin-top: 80px;
        }

        .section-header {
            font-size: 1.5rem;
            margin-bottom: 40px;
            text-align: center;
            font-weight: normal;
            letter-spacing: 0.1em;
            color: #ccc;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 60px;
            align-items: start;
        }

        .grid-container.rev {
            grid-template-columns: 1fr 450px;
        }

        /* ── ARTWORK GRIDS ── */
        .artwork-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            background: #111;
            border: 1px solid #111;
            max-width: 480px;
            margin: 0 auto;
        }

        .artwork-grid.grid-4 {
            grid-template-columns: repeat(4, 1fr);
            max-width: 460px;
        }

        .artwork-grid img,
        .artwork-grid .placeholder {
            width: 100%;
            display: block;
            object-fit: cover;
            filter: contrast(1.1);
            transition: opacity 0.3s;
            background: #050505;
        }

        .artwork-grid img:hover {
            opacity: 0.8;
        }

        /* Aspect Ratios */
        .ratio-sq img,
        .ratio-sq .placeholder {
            aspect-ratio: 1 / 1;
        }

        .ratio-po img,
        .ratio-po .placeholder {
            aspect-ratio: 2 / 3;
        }

        /* ── METADATA LIST ── */
        .metadata-list {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-height: 200px;
        }

        .metadata-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 30px;
        }

        .metadata-item {
            font-size: 11px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-decoration: none;
            display: block;
            transition: color 0.2s;
        }

        .metadata-item:hover {
            color: #fff;
        }

        .metadata-item span {
            color: #aaa;
        }

        .metadata-item b {
            font-weight: normal;
            color: #eee;
        }

        .metadata-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #777;
            margin-bottom: 4px;
        }

        .rev .metadata-list {
            text-align: right;
        }

        /* ── EMBEDS ── */
        .embeds-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .embed-box {
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            background: #050505;
        }

        /* ── MOBILE ── */
        @media (max-width: 900px) {
            body {
                padding: 20px;
            }

            .grid-container,
            .grid-container.rev {
                grid-template-columns: 1fr;
            }

            .metadata-list,
            .rev .metadata-list {
                text-align: left;
                min-height: auto;
                gap: 30px;
            }

            .artwork-grid {
                grid-template-columns: repeat(3, 1fr);
                max-width: 280px;
            }

            .artwork-grid.grid-4 {
                grid-template-columns: repeat(2, 1fr);
                max-width: 260px;
            }

            .nav-sections {
                display: none;
            }

            .artists-shelf {
                gap: 8px;
                padding-top: 12px;
            }

            .artist-pill {
                padding: 2px 8px 2px 2px;
                font-size: 8px;
            }

            .artist-img-circle {
                width: 24px;
                height: 24px;
            }
        }

        @media (max-width: 700px) {
            body {
                padding: 15px;
            }

            #sounds-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 3px;
            }

            .artwork-grid.grid-4 {
                grid-template-columns: repeat(2, 1fr);
                gap: 3px;
            }

            .grid-container,
            .grid-container.rev {
                gap: 30px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            #sounds-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 2px;
            }

            .artwork-grid.grid-4 {
                grid-template-columns: repeat(2, 1fr);
                gap: 2px;
            }

            .metadata-list {
                gap: 20px;
            }
        }

        @media (max-width: 480px) {
            #sounds-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1px;
            }

            .artwork-grid.grid-4 {
                grid-template-columns: repeat(2, 1fr);
                gap: 1px;
            }
        }
    </style>
</head>

<body>
    <div id="top-loader" class="top-loader"></div>

    <div class="page-wrap">
        <!-- ── NAV ── -->
        <nav class="page-nav">
            <a href="index.html">&larr; back</a>
            <span>pranshu acharya &mdash; world</span>
            <div class="nav-sections">
                <a href="#sounds-section">sounds</a>
                <a href="#cinema-section">cinema</a>
                <a href="#library-section">library</a>
                <a href="#games-section">den</a>
                <a href="#myfeed-section">myfeed</a>
                <a href="https://www.youtube.com/@iampac" target="_blank">youtube</a>
            </div>
        </nav>

        <!-- ── SOUNDS (MUSIC) ── -->
        <div class="world-section" id="sounds-section">
            <div class="section-header">sounds</div>
            <div class="grid-container">
                <div class="sounds-column">
                    <div class="artwork-grid ratio-sq" id="sounds-grid">
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                    </div>
                    <div id="artists-shelf" class="artists-shelf">
                        <!-- Artists go here -->
                    </div>
                </div>
                <div class="metadata-list" id="sounds-list">
                    <div class="metadata-row">
                        <div class="metadata-label">Sounds</div>
                        <div class="skeleton" style="height:12px; width:80%; margin-bottom:8px"></div>
                        <div class="skeleton" style="height:12px; width:60%; margin-bottom:8px"></div>
                        <div class="skeleton" style="height:12px; width:70%; margin-bottom:8px"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── CINEMA (MOVIES) ── -->
        <div class="world-section" id="cinema-section">
            <div class="section-header">cinema</div>
            <div class="grid-container rev">
                <div class="metadata-list" id="cinema-list">
                    <div class="metadata-row">
                        <div class="metadata-label">Cinema</div>
                        <div class="skeleton" style="height:12px; width:70%; margin-bottom:8px"></div>
                        <div class="skeleton" style="height:12px; width:50%; margin-bottom:8px"></div>
                    </div>
                </div>
                <div class="artwork-grid grid-4 ratio-po" id="cinema-grid">
                    <!-- 16 skeletons for 4x4 -->
                    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
                    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
                    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
                    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
                </div>
            </div>
        </div>

        <!-- ── LIBRARY (BOOKS) ── -->
        <div class="world-section" id="library-section">
            <div class="section-header">library</div>
            <div class="grid-container">
                <div class="artwork-grid ratio-po" id="library-grid">
                    <div class="skeleton"></div>
                    <div class="skeleton"></div>
                    <div class="skeleton"></div>
                </div>
                <div class="metadata-list" id="library-list">
                    <div class="metadata-row">
                        <div class="metadata-label">Library</div>
                        <div class="skeleton" style="height:12px; width:80%; margin-bottom:8px"></div>
                        <div class="skeleton" style="height:12px; width:70%; margin-bottom:8px"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ── DEN (GAMES) ── -->
        <div class="world-section" id="games-section">
            <div class="section-header">den</div>
            <div class="grid-container rev">
                <div class="metadata-list" id="games-list">
                    <div class="metadata-row">
                        <div class="metadata-label">Den</div>
                        <div class="skeleton" style="height:12px; width:60%; margin-bottom:8px"></div>
                        <div class="skeleton" style="height:12px; width:75%; margin-bottom:8px"></div>
                    </div>
                </div>
                <div class="artwork-grid ratio-sq" id="games-grid">
                    <div class="skeleton"></div>
                    <div class="skeleton"></div>
                    <div class="skeleton"></div>
                </div>

            </div>
        </div>

        <!-- ── MYFEED (EXTERNAL) ── -->
        <div class="world-section" id="myfeed-section">
            <div class="section-header">myfeed</div>
            <div class="embeds-grid">
                <div class="embed-box">
                    <iframe style="border-radius:0"
                        src="https://open.spotify.com/embed/artist/5nkehM0Mr6HQuUM9htuui9?utm_source=generator&theme=0"
                        width="100%" height="352" frameBorder="0" allowfullscreen=""
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                        loading="lazy"></iframe>
                </div>
                <div class="embed-box">
                    <iframe scrolling="no" frameborder="no" allow="autoplay" height="352" style="width:100%;"
                        src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/iipacii&color=%23080808&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=false"></iframe>
                </div>
            </div>
        </div>

    </div>

    <script>
        async function fetchStats() {
            const loader = document.getElementById('top-loader');
            loader.style.width = '20%';
            loader.style.opacity = '1';
            loader.style.background = '#fff';

            try {
                const response = await fetch('./data/stats.json');

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                loader.style.width = '80%';

                // ── SOUNDS (Spotify)
                const soundsGrid = document.getElementById('sounds-grid');
                const soundsList = document.getElementById('sounds-list');
                const artistsShelf = document.getElementById('artists-shelf');

                if (data.spotify && soundsGrid && soundsList) {
                    soundsGrid.innerHTML = '';
                    soundsList.innerHTML = '';
                    if (artistsShelf) artistsShelf.innerHTML = '';

                    if (data.spotify.tracks) {
                        data.spotify.tracks.slice(0, 9).forEach((track, i) => {
                            soundsGrid.innerHTML += `<a href="${track.url}" target="_blank" data-type="sounds" data-index="${i}"><img src="${track.img}" alt="${track.name}"></a>`;
                        });

                        const tracksRow = document.createElement('div');
                        tracksRow.className = 'metadata-row';
                        tracksRow.innerHTML = `<div class="metadata-label">Recent Tracks</div>`;
                        data.spotify.tracks.slice(0, 9).forEach((track, i) => {
                            tracksRow.innerHTML += `<a href="${track.url}" target="_blank" class="metadata-item" id="sounds-item-${i}" data-type="sounds" data-index="${i}"><b>${track.name}</b> <span>— ${track.artist}</span></a>`;
                        });
                        soundsList.appendChild(tracksRow);
                    }

                    if (data.spotify.artists && artistsShelf) {
                        data.spotify.artists.slice(0, 10).forEach(artist => {
                            artistsShelf.innerHTML += `
                                <a href="${artist.url}" target="_blank" class="artist-pill">
                                    <img src="${artist.img}" class="artist-img-circle" alt="">
                                    <span>${artist.name}</span>
                                </a>`;
                        });
                    }
                }

                // ── CINEMA (Letterboxd)
                const cinemaGrid = document.getElementById('cinema-grid');
                const cinemaList = document.getElementById('cinema-list');
                if (data.letterboxd && cinemaGrid && cinemaList) {
                    cinemaGrid.innerHTML = '';
                    cinemaList.innerHTML = '';

                    const topFour = data.letterboxd.topFour || [];
                    const activity = data.letterboxd.activity || [];

                    // Render Posters (Top 4 + 12 Activity = 16)
                    topFour.forEach((film, i) => {
                        cinemaGrid.innerHTML += `<a href="${film.link}" target="_blank" data-type="cinema" data-index="${i}"><img src="${film.poster}" class="top-item" alt="${film.title}"></a>`;
                    });
                    activity.slice(0, 12).forEach((film, i) => {
                        cinemaGrid.innerHTML += `<a href="${film.link}" target="_blank" data-type="cinema" data-index="${i + topFour.length}"><img src="${film.poster}" alt="${film.title}"></a>`;
                    });

                    // Metadata List
                    const topRow = document.createElement('div');
                    topRow.className = 'metadata-row';
                    topRow.innerHTML = `<div class="section-subtitle">Top 4 / All-Time</div>`;
                    topFour.forEach((film, i) => {
                        topRow.innerHTML += `<a href="${film.link}" target="_blank" class="metadata-item" id="cinema-item-${i}" data-type="cinema" data-index="${i}"><b>${film.title}</b></a>`;
                    });
                    cinemaList.appendChild(topRow);

                    const diaryRow = document.createElement('div');
                    diaryRow.className = 'metadata-row';
                    diaryRow.innerHTML = `<div class="section-subtitle">Recent Activity</div>`;
                    activity.slice(0, 12).forEach((entry, i) => {
                        diaryRow.innerHTML += `<a href="${entry.link}" target="_blank" class="metadata-item" id="cinema-item-${i + topFour.length}" data-type="cinema" data-index="${i + topFour.length}"><b>${entry.title}</b> <span>— ${entry.rating}</span></a>`;
                    });
                    cinemaList.appendChild(diaryRow);
                }

                // ── LIBRARY (Books)
                const libGrid = document.getElementById('library-grid');
                const libList = document.getElementById('library-list');
                if (data.books && libGrid && libList) {
                    libGrid.innerHTML = '';
                    libList.innerHTML = '';
                    data.books.slice(0, 3).forEach((book, i) => {
                        libGrid.innerHTML += `<a href="${book.link}" target="_blank" data-type="library" data-index="${i}"><img src="${book.cover}" alt="${book.title}"></a>`;
                    });
                    const row = document.createElement('div');
                    row.className = 'metadata-row';
                    row.innerHTML = `<div class="metadata-label">Reading Journal</div>`;
                    data.books.slice(0, 8).forEach((book, i) => {
                        const statusTag = book.status ? ` <span style="font-size:8px; opacity:0.7">[${book.status.toUpperCase()}]</span>` : '';
                        row.innerHTML += `<a href="${book.link}" target="_blank" class="metadata-item" id="library-item-${i}" data-type="library" data-index="${i}"><b>${book.title}</b> <span>— ${book.author}</span>${statusTag}</a>`;
                    });
                    libList.appendChild(row);
                }

                // ── DEN (Games)
                const gamesGrid = document.getElementById('games-grid');
                const gamesList = document.getElementById('games-list');
                if (data.games && gamesGrid && gamesList) {
                    gamesGrid.innerHTML = '';
                    gamesList.innerHTML = '';
                    data.games.slice(0, 3).forEach((game, i) => {
                        gamesGrid.innerHTML += `<div data-type="games" data-index="${i}"><img src="${game.cover}" alt="${game.name}"></div>`;
                    });
                    const row = document.createElement('div');
                    row.className = 'metadata-row';
                    row.innerHTML = `<div class="metadata-label">Active Sessions</div>`;
                    data.games.forEach((game, i) => {
                        row.innerHTML += `<div class="metadata-item" id="games-item-${i}" data-type="games" data-index="${i}"><b>${game.name}</b> <span>— ${game.platform}</span> <span style="font-size:8px; opacity:0.7">[${game.status.toUpperCase()}]</span></div>`;
                    });
                    gamesList.appendChild(row);
                }

                // Finalize Loader
                loader.style.width = '100%';
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.width = '0'; }, 500);
                }, 400);

            } catch (error) {
                console.error('Error fetching world stats:', error);
                loader.style.width = '100%';
                loader.style.background = '#ff4444';
                setTimeout(() => { loader.style.opacity = '0'; }, 2000);
            }
        }


        // ── HOVER LINKAGE (BI-DIRECTIONAL) ──
        document.addEventListener('mouseover', (e) => {
            const el = e.target.closest('[data-index]');
            if (el) {
                const section = el.closest('.world-section');
                const type = el.getAttribute('data-type');
                const idx = el.getAttribute('data-index');

                if (section) section.classList.add('is-focusing');

                // Highlight List Item
                const targetId = `${type}-item-${idx}`;
                const targetText = document.getElementById(targetId);
                if (targetText) targetText.classList.add('highlighted');

                // Highlight Poster
                const targetPoster = section?.querySelector(`.artwork-grid [data-index="${idx}"] img`);
                if (targetPoster) targetPoster.classList.add('highlighted');
            }
        });

        document.addEventListener('mouseout', (e) => {
            const el = e.target.closest('[data-index]');
            if (el) {
                const section = el.closest('.world-section');
                if (section) section.classList.remove('is-focusing');

                document.querySelectorAll('.highlighted').forEach(el => el.classList.remove('highlighted'));
            }
        });

        fetchStats();
    </script>
</body>

</html>
